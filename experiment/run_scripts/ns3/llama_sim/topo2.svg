<svg width="600" height="550" xmlns="http://www.w3.org/2000/svg">
<!-- Background and Title -->
<rect width="100%" height="100%" fill="#f9f9f9" />
<text x="300" y="30" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">场景二：4 Spine 拓扑 (全链路 200G)</text>
<text x="300" y="55" font-family="Arial" font-size="14" text-anchor="middle" fill="#666">注：线段长度代表时延 (短=1000us, 长=2236us)</text>
<!-- Definitions for markers and styles -->
<defs>
<style type="text/css">
.lbw { fill: #4CAF50; stroke: #333; stroke-width: 2; }
.spine-v { fill: #2196F3; stroke: #333; stroke-width: 2; } /* Vertical Spines 0,1 */
.spine-h { fill: #9C27B0; stroke: #333; stroke-width: 2; } /* Horizontal Spines 2,3 */
.link-short { stroke: #555; stroke-width: 2; }
.link-long { stroke: #999; stroke-width: 2; stroke-dasharray: 4,2; }
.label-txt { font-family: Arial; font-size: 14px; font-weight: bold; text-anchor: middle; alignment-baseline: middle; fill: white; }
.latency-txt { font-family: Arial; font-size: 10px; fill: #333; background-color: rgba(255,255,255,0.7); }
</style>
</defs>
<!-- Coordinates -->
<!-- LBW Coordinates (Corners) -->
<!-- LBW0: 100, 100 -->
<!-- LBW1: 500, 100 -->
<!-- LBW2: 100, 450 -->
<!-- LBW3: 500, 450 -->
<!-- Spine Coordinates (Biased positions) -->
<!-- Spine0 (Left biased): 180, 275 -->
<!-- Spine1 (Right biased): 420, 275 -->
<!-- Spine2 (Top biased): 300, 170 -->
<!-- Spine3 (Bottom biased): 300, 380 -->
<!-- LINKS -->
<!-- Spine 0 (Left) -->
<line x1="100" y1="100" x2="180" y2="275" class="link-short" /> <text x="130" y="180" class="latency-txt">1000</text>
<line x1="100" y1="450" x2="180" y2="275" class="link-short" />
<line x1="500" y1="100" x2="180" y2="275" class="link-long" /> <text x="340" y="180" class="latency-txt">2236</text>
<line x1="500" y1="450" x2="180" y2="275" class="link-long" />
<!-- Spine 1 (Right) -->
<line x1="500" y1="100" x2="420" y2="275" class="link-short" /> <text x="470" y="180" class="latency-txt">1000</text>
<line x1="500" y1="450" x2="420" y2="275" class="link-short" />
<line x1="100" y1="100" x2="420" y2="275" class="link-long" /> <text x="260" y="180" class="latency-txt">2236</text>
<line x1="100" y1="450" x2="420" y2="275" class="link-long" />
<!-- Spine 2 (Top) -->
<line x1="100" y1="100" x2="300" y2="170" class="link-short" style="stroke: #9C27B0;" /> <text x="190" y="130" class="latency-txt">1000</text>
<line x1="500" y1="100" x2="300" y2="170" class="link-short" style="stroke: #9C27B0;" />
<line x1="100" y1="450" x2="300" y2="170" class="link-long" style="stroke: #9C27B0;" /> <text x="190" y="320" class="latency-txt">2236</text>
<line x1="500" y1="450" x2="300" y2="170" class="link-long" style="stroke: #9C27B0;" />
<!-- Spine 3 (Bottom) -->
<line x1="100" y1="450" x2="300" y2="380" class="link-short" style="stroke: #9C27B0;" /> <text x="190" y="420" class="latency-txt">1000</text>
<line x1="500" y1="450" x2="300" y2="380" class="link-short" style="stroke: #9C27B0;" />
<line x1="100" y1="100" x2="300" y2="380" class="link-long" style="stroke: #9C27B0;" /> <text x="190" y="230" class="latency-txt">2236</text>
<line x1="500" y1="100" x2="300" y2="380" class="link-long" style="stroke: #9C27B0;" />
<!-- Bandwidth Legend -->
<rect x="230" y="500" width="140" height="30" fill="#ddd" stroke="#999" rx="5" />
<text x="300" y="520" font-family="Arial" font-size="12" text-anchor="middle">所有链路: 200Gbps</text>
<!-- Draw Switches -->
<!-- LBW Switches -->
<circle cx="100" cy="100" r="28" class="lbw" /> <text x="100" y="100" class="label-txt">LBW 0</text>
<circle cx="500" cy="100" r="28" class="lbw" /> <text x="500" y="100" class="label-txt">LBW 1</text>
<circle cx="100" cy="450" r="28" class="lbw" /> <text x="100" y="450" class="label-txt">LBW 2</text>
<circle cx="500" cy="450" r="28" class="lbw" /> <text x="500" y="450" class="label-txt">LBW 3</text>
<!-- Spine Switches (Using different colors to group them visually) -->
<circle cx="180" cy="275" r="32" class="spine-v" /> <text x="180" y="275" class="label-txt">Spine 0</text>
<circle cx="420" cy="275" r="32" class="spine-v" /> <text x="420" y="275" class="label-txt">Spine 1</text>
<circle cx="300" cy="170" r="32" class="spine-h" /> <text x="300" y="170" class="label-txt">Spine 2</text>
<circle cx="300" cy="380" r="32" class="spine-h" /> <text x="300" y="380" class="label-txt">Spine 3</text>
</svg>