<svg width="600" height="500" xmlns="http://www.w3.org/2000/svg">
<!-- Background and Title -->
<rect width="100%" height="100%" fill="#f9f9f9" />
<text x="300" y="30" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">场景一：2 Spine 拓扑 (全链路 400G)</text>
<text x="300" y="55" font-family="Arial" font-size="14" text-anchor="middle" fill="#666">注：线段长度代表时延 (短=250us, 长=560us)</text>
<!-- Definitions for markers and styles -->
<defs>
<style type="text/css">
.lbw { fill: #4CAF50; stroke: #333; stroke-width: 2; }
.spine { fill: #2196F3; stroke: #333; stroke-width: 2; }
.link-short { stroke: #555; stroke-width: 3; }
.link-long { stroke: #999; stroke-width: 3; stroke-dasharray: 5,2; }
.label-txt { font-family: Arial; font-size: 14px; font-weight: bold; text-anchor: middle; alignment-baseline: middle; fill: white; }
.latency-txt { font-family: Arial; font-size: 11px; fill: #333; background-color: rgba(255,255,255,0.8); }
</style>
</defs>
<!-- Coordinates -->
<!-- LBW Coordinates (Corners of a square) -->
<!-- LBW0: 100, 100 -->
<!-- LBW1: 500, 100 -->
<!-- LBW2: 100, 400 -->
<!-- LBW3: 500, 400 -->
<!-- Spine Coordinates (Biased positions based on latency) -->
<!-- Spine0 (Left biased): 200, 250 -->
<!-- Spine1 (Right biased): 400, 250 -->
<!-- Links for Spine 0 -->
<!-- Short links (250us) -->
<line x1="100" y1="100" x2="200" y2="250" class="link-short" /> <!-- LBW0 - S0 -->
<line x1="100" y1="400" x2="200" y2="250" class="link-short" /> <!-- LBW2 - S0 -->
<!-- Long links (560us) -->
<line x1="500" y1="100" x2="200" y2="250" class="link-long" /> <!-- LBW1 - S0 -->
<line x1="500" y1="400" x2="200" y2="250" class="link-long" /> <!-- LBW3 - S0 -->
<!-- Links for Spine 1 -->
<!-- Short links (250us) -->
<line x1="500" y1="100" x2="400" y2="250" class="link-short" /> <!-- LBW1 - S1 -->
<line x1="500" y1="400" x2="400" y2="250" class="link-short" /> <!-- LBW3 - S1 -->
<!-- Long links (560us) -->
<line x1="100" y1="100" x2="400" y2="250" class="link-long" /> <!-- LBW0 - S1 -->
<line x1="100" y1="400" x2="400" y2="250" class="link-long" /> <!-- LBW2 - S1 -->
<!-- Latency Labels (Sample selection to avoid clutter) -->
<text x="135" y="165" class="latency-txt">250us(70km)</text> <!-- S0-LBW0 -->
<text x="350" y="165" class="latency-txt">560us(112km)</text> <!-- S0-LBW1 -->
<text x="465" y="165" class="latency-txt">250us</text> <!-- S1-LBW1 -->
<text x="250" y="165" class="latency-txt">560us</text> <!-- S1-LBW0 -->
<!-- Bandwidth Legend -->
<rect x="230" y="450" width="140" height="30" fill="#ddd" stroke="#999" rx="5" />
<text x="300" y="470" font-family="Arial" font-size="12" text-anchor="middle">所有链路: 400Gbps</text>
<!-- Draw Switches -->
<!-- LBW Switches -->
<circle cx="100" cy="100" r="30" class="lbw" />
<text x="100" y="100" class="label-txt">LBW 0</text>
<circle cx="500" cy="100" r="30" class="lbw" />
<text x="500" y="100" class="label-txt">LBW 1</text>
<circle cx="100" cy="400" r="30" class="lbw" />
<text x="100" y="400" class="label-txt">LBW 2</text>
<circle cx="500" cy="400" r="30" class="lbw" />
<text x="500" y="400" class="label-txt">LBW 3</text>
<!-- Spine Switches -->
<circle cx="200" cy="250" r="35" class="spine" />
<text x="200" y="250" class="label-txt">Spine 0</text>
<circle cx="400" cy="250" r="35" class="spine" />
<text x="400" y="250" class="label-txt">Spine 1</text>
</svg>